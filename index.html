<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kjøretøy – Industrikran</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1c3461; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px;
}
h1 { color: #fff; font-size: 1.3rem; margin-bottom: 6px; text-align: center; }
p  { color: rgba(255,255,255,.65); font-size: .85rem; margin-bottom: 36px; text-align: center; }
.cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 380px; }
a.card {
  background: #fff; border-radius: 14px; padding: 22px 24px;
  text-decoration: none; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,.2); transition: transform .15s;
}
a.card:hover { transform: translateY(-2px); }
.icon { font-size: 2rem; flex-shrink: 0; }
.card-text h2 { font-size: .95rem; font-weight: 700; color: #1c3461; margin-bottom: 3px; }
.card-text p  { font-size: .78rem; color: #6b7280; margin: 0; }
</style>
</head>
<body>
  <h1>🚐 Kjøretøy – Industrikran</h1>
  <p>Velg app</p>
  <div class="cards">
    <a class="card" href="/kjoretoy-innsamling.html">
      <div class="icon">📋</div>
      <div class="card-text">
        <h2>Vernerunde – innlevering</h2>
        <p>Registrer kjøretøytilstand (for sjåfører)</p>
      </div>
    </a>
    <a class="card" href="/kjoretoy-dashboard.html">
      <div class="icon">📊</div>
      <div class="card-text">
        <h2>Kjøretøy Dashboard</h2>
        <p>Oversikt ABAX + vernerunde-data (for ledelsen)</p>
      </div>
    </a>
  </div>
</body>
</html>
